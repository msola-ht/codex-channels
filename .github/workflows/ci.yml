name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node 22 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check types and versions
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Check launchd templates
        if: runner.os == 'macOS'
        run: plutil -lint launchd/*.plist.template

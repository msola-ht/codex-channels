name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node 22 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check types and versions
        run: npm run check

      - name: Lint production source
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Test package tarball
        run: npm run test:package

      - name: Check launchd templates
        if: runner.os == 'macOS'
        run: plutil -lint launchd/*.plist.template

  app-server-contract:
    name: Codex 0.145.0 App Server contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install locked Codex CLI
        run: npm install --global @openai/codex@0.145.0

      - name: Check protocol version
        run: npm run protocol:check

      - name: Run isolated App Server contract
        run: RUN_CODEX_CONTRACT=1 npm test -- --run tests/real-app-server.test.ts
